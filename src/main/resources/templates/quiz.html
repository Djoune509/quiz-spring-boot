<!DOCTYPE html> 
<html xmlns:th="http://www.thymeleaf.org">
    <head> <meta charset="UTF-8"> 
        <title>Quiz</title> 
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"> 
        <style>
            body{
    background: linear-gradient(120deg,#4e73df,#224abe);
    min-height:100vh;
}
.card{
    border-radius:15px;
}
.question-block{
    display:none;
}
        </style>
    </head>
    <body> 
        <div class="container mt-5"> 
            <div class="row justify-content-center">
                <div class="col-md-6">
                    
                    <div class="card shadow-lg p-4"> 
                        <h2 class="text-center mb-4 text-primary">Quiz</h2>
                        <form id="quizForm">
                            
                            <div th:each="q, stat : ${questions}"
                                 
                               th:id="'question'+${stat.index}"
                               
                               class="mb-4 question-block">
                                <h5 class="fw-bold" 
                                    th:text="'Question ' + ${stat.index + 1}"></h5>
                                
                                <p th:text="${q.question}"></p>
                                <div class="form-check">
                                    
                                    <input class="form-check-input"
                                    type="radio" 
                                    th:name="'q'+${stat.index}"
                                    th:value="${q.option1}">
                                    <label class="form-check-label" 
                                    th:text="${q.option1}">
                                    </label> 
                                </div>
                                
                                <div class="form-check"> 
                                    <input class="form-check-input"
                                    type="radio"
                                    th:name="'q'+${stat.index}"
                                    th:value="${q.option2}">
                                    <label class="form-check-label"
                                    th:text="${q.option2}">
                                    </label>
                                </div>
                                
                                <div class="form-check">
                                    <input class="form-check-input"
                                    type="radio"
                                    th:name="'q'+${stat.index}"
                                    th:value="${q.option3}">
                                    <label class="form-check-label"
                                    th:text="${q.option3}"> 
                                    </label>
                                </div> 
                                
                                <div class="form-check">
                                    <input class="form-check-input"
                                    type="radio"
                                    th:name="'q'+${stat.index}"
                                    th:value="${q.option4}">
                                    <label class="form-check-label" 
                                    th:text="${q.option4}">
                                    </label>
                                </div>
                                
                                <input type="hidden"
                                th:id="'answer'+${stat.index}"
                                th:value="${q.answer}">
                                
                            </div>
                            
                            <div class="text-center">
                                <button type="button"
                                class="btn btn-primary px-4"
                                onclick="nextQuestion()">
                                    Valider
                                </button>
                                
                            </div>
                            
                        </form>
                        
                        <div class="mt-4 text-center">
                            
                            <h4 id="resultat"
                            class="text-success"></h4>
                        </div>
                    
                    </div>
                
                </div>
            
            </div>
        </div> 
        
        <script>
            
 let currentQuestion = 0;
 let score = 0;
 
 let questions = document.getElementsByClassName("question-block");
 
 window.onload = function(){
     questions[0].style.display = "block";
 }
 
 function nextQuestion(){
     
     let radios = document.getElementsByName("q" + currentQuestion);
     let correct =
     document.getElementById("answer" + currentQuestion).value;
     
     let answered = false;
     
     for (let r of radios){
         
         if (r.checked){
              answered=true;
              
              if (r.value === correct){
                  score++;
              }
         }
     }
     
     if (!answered){
         alert("Veuillez choisir une réponse"); 
         return;
     }
     
     questions[currentQuestion].style.display = "none";
     
     currentQuestion++;
     
     if (currentQuestion < questions.length){
         
         questions[currentQuestion].style.display = "block";
     }else{
         
         let note = (score * 20) / questions.length;
         
         alert("Votre note est : " + note.toFixed(2) + " /20");
        
         window.location.href = "/";
     }
 }
 
 </script>
</html>
